name: CI

# Build the whole solution on every push and pull request so breakages show up early.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest   # the tray app targets net10.0-windows (WinForms)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PdfAutoCompress.slnx

      - name: Build
        run: dotnet build PdfAutoCompress.slnx -c Release --no-restore

      - name: Test
        run: dotnet test PdfAutoCompress.slnx -c Release --no-build
