name: Bug report
description: Something isn't working the way you expect.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I downloaded a PDF and it wasn't compressed…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: app
    attributes:
      label: Which version are you using?
      options:
        - Tray app (Windows)
        - Background service (Windows)
        - Command-line tool (CLI)
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Right-click the tray icon ▸ Settings shows the version. Or the release you downloaded.
      placeholder: "1.0.0"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11"
  - type: input
    id: ghostscript
    attributes:
      label: Ghostscript version (if known)
      placeholder: "10.07.1"
  - type: textarea
    id: activity-log
    attributes:
      label: Recent activity log
      description: If using the tray app, copy the text from Settings ▸ Recent activity.
      render: text
