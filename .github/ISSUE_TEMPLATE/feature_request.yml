name: Feature request
description: Suggest an idea or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature and why it would be useful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Anything you've tried or considered?
